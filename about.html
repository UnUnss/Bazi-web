<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們 · ElementaWall</title>
    <link rel="stylesheet" href="assets/fonts/cooper-zhengkai/style.css" />
    <script src="i18n.js?v=5"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #2a1e0a;
            --line: rgba(42, 30, 10, 0.28);
            --font-kai: "CooperZhengKai", serif;
        }

        html, body {
            font-family: var(--font-kai);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-paper {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: url('assets/bg-paper.jpg') center / cover no-repeat;
            pointer-events: none;
        }

        .disk-wrap {
            position: fixed;
            left: -51.16vw;
            top: 1.92vh;
            width: 145.83vw;
            height: auto;
            z-index: -1;
            pointer-events: none;
        }

        .disk-wrap img {
            display: block;
            width: 100%;
            height: auto;
            animation: spin 90s linear infinite;
            transform-origin: 51.77% 49.9%;
        }

        .disk-wrap .disk-img {
            position: relative;
            mix-blend-mode: darken;
            opacity: 0.15;
        }

        .disk-wrap .dragon-img {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.5;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ─── 導航 ─── */
        nav {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: calc(84px - 2vh) 52px 20px;
            position: relative;
            z-index: 50;
            min-height: 22px;
        }

        .nav-logo-wrap {
            position: absolute;
            top: calc(4px - 3vh);
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            pointer-events: none;
        }

        .nav-logo-wrap img {
            display: block;
            width: 100%;
            height: auto;
        }

        .nav-user {
            position: relative;
            z-index: 51;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link-item,
        .lang-switch-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.06em;
            padding: 6px 16px;
            border: 1px solid var(--line);
            border-radius: 2px;
            background: rgba(255, 252, 245, 0.6);
            color: var(--ink);
            cursor: pointer;
        }

        .nav-link-item:hover,
        .lang-switch-btn:hover {
            background: rgba(255, 252, 245, 0.9);
        }

        .lang-switch-wrap,
        .about-switch-wrap {
            position: relative;
        }

        .lang-switch-btn .caret,
        .about-switch-btn .caret {
            font-size: 9px;
            opacity: 0.7;
        }

        .lang-menu,
        .about-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 160px;
            background: rgba(255, 252, 245, 0.96);
            border: 1px solid var(--line);
            border-radius: 2px;
            z-index: 20;
            box-shadow: 0 8px 24px rgba(42, 30, 10, 0.08);
            overflow: hidden;
        }

        .lang-menu.open,
        .about-menu.open {
            display: block;
        }

        .lang-menu button,
        .about-menu a {
            display: block;
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.04em;
            padding: 9px 14px;
            border: none;
            background: transparent;
            color: var(--ink);
            text-decoration: none;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid rgba(42, 30, 10, 0.08);
        }

        .lang-menu button:last-child,
        .about-menu a:last-child {
            border-bottom: none;
        }

        .lang-menu button:hover,
        .lang-menu button.active,
        .about-menu a:hover {
            background: rgba(42, 30, 10, 0.05);
        }

        /* ─── 內容區：屋頂 + 動態珠簾 ─── */
        .page-content {
            max-width: 960px;
            width: calc(100% - 48px);
            margin: -18vh auto 60px;
            text-align: center;
        }

        .curtain-stage {
            position: relative;
            width: 150%;
            margin-left: -25%;
            isolation: isolate;
        }

        #curtain {
            position: absolute;
            inset: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: block;
            cursor: default;
            touch-action: none;
        }

        .temple {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            z-index: 2;
            pointer-events: none;
        }

        .temple img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 720px) {
            nav {
                padding: 96px 20px 16px;
                justify-content: center;
            }
            .nav-logo-wrap {
                position: absolute;
                top: 0;
                left: -50vw;
                width: 200vw;
                transform: none;
            }
            .disk-wrap {
                left: -116.80vw;
                top: 11.62vh;
                width: 263.65vw;
            }
            .nav-user { gap: 8px; }
            .nav-link-item,
            .lang-switch-btn {
                font-size: 12px;
                padding: 5px 10px;
            }
            .page-content {
                width: calc(100% - 24px);
                margin: -34px auto 48px;
            }
            .curtain-stage {
                width: 150%;
                margin-left: -25%;
            }
        }
    </style>
</head>
<body>

<div class="bg-paper"></div>
<div class="disk-wrap" aria-hidden="true">
    <img class="disk-img" src="assets/disk.png" alt="" draggable="false">
    <img class="dragon-img" src="assets/dragon.png" alt="" draggable="false">
</div>

<nav>
    <div class="nav-logo-wrap">
        <img src="assets/english.png" alt="ElementaWall" draggable="false">
    </div>
    <div class="nav-user">
        <a href="javascript:void(0)" class="nav-link-item" data-i18n="nav_back" onclick="history.length>1?history.back():location.href='landing.html'">返回</a>
        <div class="about-switch-wrap" id="aboutSwitchWrap">
            <button type="button" class="nav-link-item about-switch-btn" id="aboutSwitchBtn">
                <span data-i18n="nav_about">關於我們</span><span class="caret">▼</span>
            </button>
            <div class="about-menu" id="aboutMenu" role="menu">
                <a href="about.html" data-i18n="nav_about">關於我們</a>
                <a href="contact.html" data-i18n="nav_contact">聯絡我們</a>
                <a href="policy.html" data-i18n="nav_policy">用戶服務與隱私協議</a>
            </div>
        </div>
        <div class="lang-switch-wrap" id="langSwitchWrap">
            <button type="button" class="lang-switch-btn" id="langSwitchBtn">
                <span id="langSwitchLabel">语言</span><span class="caret">▼</span>
            </button>
            <div class="lang-menu" id="langMenu" role="menu">
                <button type="button" data-lang-option="zh-TW" data-i18n="lang_menu_zh_tw">繁體中文</button>
                <button type="button" data-lang-option="zh-CN" data-i18n="lang_menu_zh_cn">简体中文</button>
                <button type="button" data-lang-option="en" data-i18n="lang_menu_en">English</button>
            </div>
        </div>
        <a href="landing.html" class="nav-link-item" data-i18n="nav_login">登入 / 註冊</a>
    </div>
</nav>

<main class="page-content">
    <div class="curtain-stage" id="curtainStage" aria-label="關於我們">
        <canvas id="curtain" aria-label="動態文字珠簾"></canvas>
        <div class="temple" id="temple">
            <img id="templeImg" src="assets/house.png" width="2880" height="1800" alt="" draggable="false" decoding="async">
        </div>
    </div>
</main>

<script>
(function () {
    function getLang() {
        return (window.I18N && window.I18N.getLanguage()) || localStorage.getItem('ew_lang') || 'zh-TW';
    }

    const langSwitchBtn = document.getElementById('langSwitchBtn');
    const langMenu = document.getElementById('langMenu');
    const langSwitchLabel = document.getElementById('langSwitchLabel');
    const aboutSwitchBtn = document.getElementById('aboutSwitchBtn');
    const aboutMenu = document.getElementById('aboutMenu');

    function updateLangLabel() {
        const lang = getLang();
        langSwitchLabel.textContent = lang === 'zh-TW' ? '語言' : (lang === 'en' ? 'Language' : '语言');
    }
    updateLangLabel();
    document.addEventListener('i18n:change', updateLangLabel);

    langSwitchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        aboutMenu.classList.remove('open');
        langMenu.classList.toggle('open');
    });

    langMenu.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-lang-option]');
        if (!btn) return;
        const lang = btn.getAttribute('data-lang-option');
        if (window.I18N) window.I18N.setLanguage(lang);
        langMenu.classList.remove('open');
    });

    aboutSwitchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        langMenu.classList.remove('open');
        aboutMenu.classList.toggle('open');
    });

    aboutMenu.addEventListener('click', () => { aboutMenu.classList.remove('open'); });

    document.addEventListener('click', () => {
        langMenu.classList.remove('open');
        aboutMenu.classList.remove('open');
    });
})();

(function () {
    const IMG_W = 2880;
    const IMG_H = 1800;
    const TEXT_TOP = 600;
    const COL_LEFT = 679;
    const COL_RIGHT = 2210;
    const FONT_SIZE = 30;

    const stage = document.getElementById('curtainStage');
    const canvas = document.getElementById('curtain');
    const ctx = canvas.getContext('2d');
    const templeImg = document.getElementById('templeImg');
    const chains = [];
    let glyphs = [];
    const mouse = { x: -999, y: -999, oldX: -999, oldY: -999, active: false };
    const physics = { strength: 0.72, radius: 34, friction: 0.965, gravity: 0.18 };
    const sound = {
        context: null,
        output: null,
        lastStrike: [],
        lastGlobal: 0,
        voices: 0,
        scale: [523.25, 587.33, 659.25, 783.99, 880, 1046.5, 1174.66, 1318.51, 1567.98, 1760]
    };
    let width = 0;
    let height = 0;
    let dpr = 1;
    let fontReady = false;
    let fontCss = '30px CooperZhengKai, "KaiTi", "楷体", serif';
    let fontPx = 30;

    function parseGlyphs(text) {
        const out = [];
        let pendingGap = false;
        for (const ch of text) {
            if (/\s/.test(ch)) {
                pendingGap = true;
                continue;
            }
            out.push({ ch, gapBefore: pendingGap && out.length > 0 });
            pendingGap = false;
        }
        return out;
    }

    function isHan(ch) {
        return ch && /\p{Script=Han}/u.test(ch);
    }

    function isSideways(ch) {
        return !!(ch && !isHan(ch));
    }

    function stepFor(glyph) {
        if (glyph.gapBefore) {
            return (isHan(glyph.ch) ? 1.26 : 1.12) * fontPx;
        }
        if (isSideways(glyph.ch)) return 0.66 * fontPx;
        return 0.878 * fontPx;
    }

    function columnCount(curtainWidth) {
        const minPitch = Math.max(fontPx * 1.45, 14);
        const byPitch = Math.floor(curtainWidth / minPitch) + 1;
        if (width < 520) return Math.max(12, Math.min(18, byPitch));
        if (width < 780) return Math.max(14, Math.min(22, byPitch));
        if (width < 1100) return Math.max(18, Math.min(26, byPitch));
        return Math.max(22, Math.min(30, byPitch));
    }

    function unlockSound() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        if (!sound.context) {
            const context = new AudioContext();
            const output = context.createGain();
            const compressor = context.createDynamicsCompressor();
            const delay = context.createDelay(0.3);
            const feedback = context.createGain();
            const wet = context.createGain();

            output.gain.value = 0.62;
            compressor.threshold.value = -18;
            compressor.ratio.value = 3;
            delay.delayTime.value = 0.11;
            feedback.gain.value = 0.14;
            wet.gain.value = 0.13;

            output.connect(compressor);
            output.connect(delay);
            delay.connect(feedback);
            feedback.connect(delay);
            delay.connect(wet);
            wet.connect(compressor);
            compressor.connect(context.destination);
            sound.context = context;
            sound.output = output;
        }
        if (sound.context.state === 'suspended') sound.context.resume().catch(() => {});
    }

    function strikeChain(columnIndex, impact, x) {
        const context = sound.context;
        if (!context || context.state !== 'running' || impact < 1.1) return;

        const timestamp = performance.now();
        if (timestamp - (sound.lastStrike[columnIndex] || 0) < 95) return;
        if (timestamp - sound.lastGlobal < 28 || sound.voices >= 8) return;

        sound.lastStrike[columnIndex] = timestamp;
        sound.lastGlobal = timestamp;
        sound.voices += 1;

        const now = context.currentTime;
        const frequency = sound.scale[columnIndex % sound.scale.length];
        const level = 0.028 + Math.min(impact, 18) / 18 * 0.075;
        const duration = 0.72 + Math.random() * 0.32;
        const spatial = context.createStereoPanner ? context.createStereoPanner() : context.createGain();
        const pan = Math.max(-0.9, Math.min(0.9, x / width * 2 - 1));
        if (spatial.pan) spatial.pan.setValueAtTime(pan, now);
        spatial.connect(sound.output);

        [
            { ratio: 1, amount: 1, decay: 1 },
            { ratio: 2.01, amount: 0.24, decay: 0.62 },
            { ratio: 3.96, amount: 0.1, decay: 0.38 }
        ].forEach((partial) => {
            const oscillator = context.createOscillator();
            const envelope = context.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency * partial.ratio, now);
            oscillator.detune.setValueAtTime((Math.random() - 0.5) * 8, now);
            envelope.gain.setValueAtTime(level * partial.amount, now);
            envelope.gain.exponentialRampToValueAtTime(0.0001, now + duration * partial.decay);
            oscillator.connect(envelope);
            envelope.connect(spatial);
            oscillator.start(now);
            oscillator.stop(now + duration + 0.05);
        });

        window.setTimeout(() => {
            sound.voices = Math.max(0, sound.voices - 1);
            spatial.disconnect();
        }, (duration + 0.15) * 1000);
    }

    function build() {
        chains.length = 0;
        if (!width || !glyphs.length) return;

        const scale = width / IMG_W;
        fontPx = Math.max(12, FONT_SIZE * scale);
        const left = COL_LEFT * scale;
        const right = COL_RIGHT * scale;
        const curtainWidth = right - left;
        const top = TEXT_TOP * scale;
        const columns = columnCount(curtainWidth);
        physics.radius = Math.max(20, fontPx * 2.2);
        physics.gravity = 0.16 * Math.max(0.6, Math.min(1.2, scale * 2));

        const steps = glyphs.map((g) => stepFor(g));
        const totalStep = steps.reduce((sum, s) => sum + s, 0);
        const targetLen = totalStep / Math.max(1, columns);
        const bucket = Array.from({ length: columns }, () => []);
        let col = columns - 1;
        let colLen = 0;

        for (let i = 0; i < glyphs.length; i += 1) {
            const step = steps[i];
            if (
                bucket[col].length > 0 &&
                col > 0 &&
                colLen + step > targetLen &&
                colLen >= targetLen * 0.7
            ) {
                col -= 1;
                colLen = 0;
            }
            if (bucket[col].length === 0) {
                bucket[col].push(glyphs[i]);
            } else {
                colLen += step;
                bucket[col].push(glyphs[i]);
            }
        }

        let maxBottom = top;
        for (let column = 0; column < columns; column += 1) {
            const items = bucket[column];
            if (!items.length) continue;
            const x = columns === 1 ? left : left + column * curtainWidth / (columns - 1);
            const chain = [];
            let y = top;
            for (let row = 0; row < items.length; row += 1) {
                const glyph = items[row];
                const rest = row === 0 ? 0 : stepFor(glyph);
                if (row > 0) y += rest;
                chain.push({
                    x,
                    y,
                    oldX: x,
                    oldY: y,
                    anchorX: x,
                    anchorY: y,
                    pinned: row === 0,
                    restLength: rest || stepFor(glyph),
                    char: glyph.ch,
                    sideways: isSideways(glyph.ch)
                });
            }
            chains.push(chain);
            maxBottom = Math.max(maxBottom, chain[chain.length - 1].y + fontPx);
        }

        const targetBottom = maxBottom - fontPx;
        for (const chain of chains) {
            if (chain.length < 2) continue;
            const span = chain[chain.length - 1].y - chain[0].y;
            const want = targetBottom - chain[0].y;
            if (span < 8 || want <= span * 1.02) continue;
            const factor = want / span;
            if (factor > 1.35) continue;
            for (let i = 1; i < chain.length; i += 1) {
                const p = chain[i];
                p.restLength *= factor;
                p.y = chain[0].y + (p.y - chain[0].y) * factor;
                p.oldY = p.y;
            }
        }
        maxBottom = top;
        for (const chain of chains) {
            if (chain.length) {
                maxBottom = Math.max(maxBottom, chain[chain.length - 1].y + fontPx);
            }
        }

        fontCss = `${fontPx}px CooperZhengKai, "KaiTi", "楷体", serif`;
        ctx.font = fontCss;

        const roofH = width * (IMG_H / IMG_W);
        const needed = Math.max(roofH, maxBottom + fontPx * 2.2);
        if (Math.abs(needed - height) > 1) {
            stage.style.height = `${needed}px`;
            height = needed;
            dpr = Math.min(2, window.devicePixelRatio || 1);
            canvas.width = Math.round(width * dpr);
            canvas.height = Math.round(height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.font = fontCss;
        }
    }

    function resize() {
        const rect = stage.getBoundingClientRect();
        width = rect.width;
        const roofH = width * (IMG_H / IMG_W);
        height = Math.max(rect.height, roofH);
        stage.style.height = `${height}px`;
        dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        build();
    }

    function injectMouseDelta() {
        if (!mouse.active) return;
        const moveX = mouse.x - mouse.oldX;
        const moveY = mouse.y - mouse.oldY;
        const speed = Math.hypot(moveX, moveY);
        if (speed < 0.01 || speed > 80) return;
        for (let chainIndex = 0; chainIndex < chains.length; chainIndex += 1) {
            const chain = chains[chainIndex];
            let strongestImpact = 0;
            for (let index = 1; index < chain.length; index += 1) {
                const point = chain[index];
                const distance = Math.hypot(point.x - mouse.oldX, point.y - mouse.oldY);
                if (distance >= physics.radius) continue;
                const falloff = 1 - distance / physics.radius;
                strongestImpact = Math.max(strongestImpact, speed * falloff);
                point.x += moveX * physics.strength * falloff;
                point.y += moveY * physics.strength * falloff;
            }
            if (strongestImpact > 0) strikeChain(chainIndex, strongestImpact, chain[0].x);
        }
    }

    function integrate() {
        for (const chain of chains) {
            for (const point of chain) {
                if (point.pinned) continue;
                const velocityX = (point.x - point.oldX) * physics.friction;
                const velocityY = (point.y - point.oldY) * physics.friction;
                point.oldX = point.x;
                point.oldY = point.y;
                point.x += velocityX;
                point.y += velocityY + physics.gravity;
            }
        }
    }

    function constrain() {
        for (let pass = 0; pass < 8; pass += 1) {
            for (const chain of chains) {
                const anchor = chain[0];
                anchor.x = anchor.anchorX;
                anchor.y = anchor.anchorY;
                for (let index = 1; index < chain.length; index += 1) {
                    const a = chain[index - 1];
                    const b = chain[index];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const distance = Math.max(0.0001, Math.hypot(dx, dy));
                    const difference = (distance - b.restLength) / distance;
                    if (a.pinned) {
                        b.x -= dx * difference;
                        b.y -= dy * difference;
                    } else {
                        const cx = dx * difference * 0.5;
                        const cy = dy * difference * 0.5;
                        a.x += cx;
                        a.y += cy;
                        b.x -= cx;
                        b.y -= cy;
                    }
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        if (!fontReady) return;
        ctx.font = fontCss;
        ctx.fillStyle = '#2a1e0a';
        ctx.globalAlpha = 1;
        for (const chain of chains) {
            for (const point of chain) {
                if (!point.char) continue;
                if (point.sideways) {
                    ctx.save();
                    ctx.translate(point.x, point.y + fontPx * 0.28);
                    ctx.rotate(Math.PI / 2);
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(point.char, 0, 0);
                    ctx.restore();
                } else {
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillText(point.char, point.x, point.y);
                }
            }
        }
    }

    function frame() {
        integrate();
        constrain();
        draw();
        requestAnimationFrame(frame);
    }

    function pointerPos(event) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: event.clientX - rect.left,
            y: event.clientY - rect.top
        };
    }

    function enter(event) {
        unlockSound();
        const p = pointerPos(event);
        mouse.x = mouse.oldX = p.x;
        mouse.y = mouse.oldY = p.y;
        mouse.active = true;
    }

    function move(event) {
        if (!mouse.active) enter(event);
        mouse.oldX = mouse.x;
        mouse.oldY = mouse.y;
        const p = pointerPos(event);
        mouse.x = p.x;
        mouse.y = p.y;
        injectMouseDelta();
    }

    function leave() {
        mouse.active = false;
    }

    async function loadBodyText() {
        try {
            const response = await fetch('assets/tiantan.txt');
            if (!response.ok) throw new Error(String(response.status));
            glyphs = parseGlyphs(await response.text());
            build();
        } catch (error) {
            console.warn('tiantan.txt load failed', error);
        }
    }

    async function boot() {
        try {
            await document.fonts.load(`${FONT_SIZE}px CooperZhengKai`);
        } catch (_) { /* ignore */ }
        fontReady = true;
        if (!templeImg.complete) {
            await new Promise((resolve) => {
                templeImg.addEventListener('load', resolve, { once: true });
                templeImg.addEventListener('error', resolve, { once: true });
            });
        }
        resize();
        await loadBodyText();
        frame();
    }

    canvas.addEventListener('pointerenter', enter);
    canvas.addEventListener('pointermove', move);
    canvas.addEventListener('pointerleave', leave);
    canvas.addEventListener('pointerdown', unlockSound, { passive: true });
    window.addEventListener('pointerdown', unlockSound, { passive: true });
    window.addEventListener('resize', resize);
    boot();
})();
</script>
</body>
</html>
