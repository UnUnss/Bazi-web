<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_contact">聯絡我們 · ElementaWall</title>
    <link rel="stylesheet" href="assets/fonts/cooper-zhengkai/style.css" />
    <script src="i18n.js?v=7"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #2a1e0a;
            --ink-soft: #5a4a28;
            --ink-muted: #8a7a58;
            --line: rgba(42, 30, 10, 0.28);
            --font-kai: "CooperZhengKai", serif;
        }

        html, body {
            font-family: var(--font-kai);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-paper {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: url('assets/bg-paper.jpg') center / cover no-repeat;
            pointer-events: none;
        }

        .disk-wrap {
            position: fixed;
            left: -51.16vw;
            top: 1.92vh;
            width: 145.83vw;
            height: auto;
            z-index: -1;
            pointer-events: none;
        }

        .disk-wrap img {
            display: block;
            width: 100%;
            height: auto;
            animation: spin 90s linear infinite;
            transform-origin: 51.77% 49.9%;
        }

        .disk-wrap .disk-img {
            position: relative;
            mix-blend-mode: darken;
            opacity: 0.15;
        }

        .disk-wrap .dragon-img {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.5;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ─── 導航 ─── */
        nav {
            position: relative;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: calc(84px - 2vh) 52px 20px;
            min-height: 22px;
        }

        .nav-logo-wrap {
            position: absolute;
            top: calc(4px - 3vh);
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            pointer-events: none;
        }

        .nav-logo-wrap img {
            display: block;
            width: 100%;
            height: auto;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link-item,
        .lang-switch-btn,
        .btn-login {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.06em;
            padding: 6px 16px;
            border: 1px solid var(--line);
            border-radius: 2px;
            background: rgba(255, 252, 245, 0.6);
            color: var(--ink);
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-link-item:hover,
        .lang-switch-btn:hover,
        .btn-login:hover {
            background: rgba(255, 252, 245, 0.9);
        }

        .lang-switch-wrap,
        .about-switch-wrap { position: relative; }

        .lang-switch-btn .caret,
        .about-switch-btn .caret {
            font-size: 9px;
            opacity: 0.7;
        }

        .lang-menu,
        .about-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 160px;
            background: rgba(255, 252, 245, 0.96);
            border: 1px solid var(--line);
            border-radius: 2px;
            z-index: 20;
            box-shadow: 0 8px 24px rgba(42, 30, 10, 0.08);
            overflow: hidden;
        }

        .lang-menu.open,
        .about-menu.open { display: block; }

        .lang-menu button,
        .about-menu a {
            display: block;
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.04em;
            padding: 9px 14px;
            border: none;
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid rgba(42, 30, 10, 0.08);
        }

        .lang-menu button:last-child,
        .about-menu a:last-child { border-bottom: none; }
        .lang-menu button:hover,
        .lang-menu button.active,
        .about-menu a:hover { background: rgba(42, 30, 10, 0.05); }
        .about-menu a { text-decoration: none; }

        .auth-area { position: relative; display: flex; align-items: center; }
        .user-menu-wrap { position: relative; }
        .nav-user-icon {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--line); border-radius: 50%;
            background: rgba(255, 252, 245, 0.6);
            cursor: pointer; color: var(--ink);
        }
        .nav-user-icon:hover { background: rgba(255, 252, 245, 0.9); }
        .user-menu {
            display: none; position: absolute; top: calc(100% + 6px); right: 0;
            min-width: 160px; background: rgba(255, 252, 245, 0.96);
            border: 1px solid var(--line); border-radius: 2px;
            z-index: 20; box-shadow: 0 8px 24px rgba(42, 30, 10, 0.08); overflow: hidden;
        }
        .user-menu.open { display: block; }
        .user-menu-email {
            padding: 9px 14px; font-size: 12px; color: var(--ink-soft);
            letter-spacing: 0.02em; border-bottom: 1px solid rgba(42, 30, 10, 0.08);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .user-menu-email:empty { display: none; }
        .user-menu button {
            display: block; width: 100%; font-family: inherit; font-size: 13px;
            letter-spacing: 0.04em; padding: 9px 14px; border: none;
            background: transparent; color: var(--ink); cursor: pointer;
            text-align: left; border-bottom: 1px solid rgba(42, 30, 10, 0.08);
        }
        .user-menu button:last-child { border-bottom: none; }
        .user-menu button:hover { background: rgba(42, 30, 10, 0.05); }

        /* ─── 內容 ─── */
        .page-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 32px 80px;
            text-align: center;
        }

        .page-title {
            font-size: 22px;
            letter-spacing: 0.24em;
            color: var(--ink-soft);
            margin-bottom: 40px;
        }

        .contact-card {
            background: rgba(255, 252, 245, 0.72);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .contact-label {
            font-size: 12px;
            letter-spacing: 0.18em;
            color: var(--ink-muted);
        }

        .contact-value {
            font-size: 15px;
            letter-spacing: 0.08em;
            color: var(--ink);
        }

        .contact-value a {
            color: var(--ink);
            text-decoration: none;
        }

        .contact-value a:hover {
            text-decoration: underline;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--line);
            opacity: 0.5;
        }

        @media (max-width: 720px) {
            nav {
                padding: 96px 20px 16px;
                justify-content: center;
            }
            .nav-logo-wrap {
                position: absolute;
                top: 0;
                left: -50vw;
                width: 200vw;
                transform: none;
            }
            .disk-wrap {
                left: -116.80vw;
                top: 11.62vh;
                width: 263.65vw;
            }
            .nav-user { gap: 8px; }
            .nav-link-item,
            .lang-switch-btn {
                font-size: 12px;
                padding: 5px 10px;
            }
            .page-content { padding: 28px 20px 60px; }
            .contact-card { padding: 28px 24px; }
        }
    </style>
</head>
<body>

<div class="bg-paper"></div>
<div class="disk-wrap" aria-hidden="true">
    <img class="disk-img" src="assets/disk.png" alt="" draggable="false">
    <img class="dragon-img" src="assets/dragon.png" alt="" draggable="false">
</div>

<nav>
    <div class="nav-logo-wrap">
        <img src="assets/english.png" alt="ElementaWall" draggable="false">
    </div>
    <div class="nav-user">
        <a href="javascript:void(0)" class="nav-link-item" data-i18n="nav_back" onclick="history.length>1?history.back():location.href='landing.html'">返回</a>
        <div class="about-switch-wrap" id="aboutSwitchWrap">
            <button type="button" class="nav-link-item about-switch-btn" id="aboutSwitchBtn">
                <span data-i18n="nav_about">關於我們</span><span class="caret">▼</span>
            </button>
            <div class="about-menu" id="aboutMenu" role="menu">
                <a href="about.html" data-i18n="nav_about">關於我們</a>
                <a href="contact.html" data-i18n="nav_contact">聯絡我們</a>
                <a href="policy.html" data-i18n="nav_policy">用戶服務與隱私協議</a>
            </div>
        </div>
        <div class="lang-switch-wrap" id="langSwitchWrap">
            <button type="button" class="lang-switch-btn" id="langSwitchBtn">
                <span id="langSwitchLabel">语言</span><span class="caret">▼</span>
            </button>
            <div class="lang-menu" id="langMenu" role="menu">
                <button type="button" data-lang-option="zh-TW" data-i18n="lang_menu_zh_tw">繁體中文</button>
                <button type="button" data-lang-option="zh-CN" data-i18n="lang_menu_zh_cn">简体中文</button>
                <button type="button" data-lang-option="en" data-i18n="lang_menu_en">English</button>
            </div>
        </div>
        <div class="auth-area" id="authArea">
            <button type="button" class="btn-login" id="btnLogin" data-i18n="nav_login">登入 / 註冊</button>
            <div class="user-menu-wrap" id="userMenuWrap" style="display:none;">
                <div class="nav-user-icon" id="userMenuBtn" aria-label="用戶">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="user-menu" id="userMenu" role="menu">
                    <div class="user-menu-email" id="userMenuEmail"></div>
                    <button type="button" id="btnDownloadHistory" data-i18n="nav_download_history">下載記錄</button>
                    <button type="button" id="btnAccount" data-i18n="nav_account">帳號管理</button>
                    <button type="button" id="btnLogout" data-i18n="nav_logout">退出</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="page-content">
    <h1 class="page-title" data-i18n="nav_contact">聯絡我們</h1>
    <div class="contact-card">
        <div class="contact-item">
            <span class="contact-label" data-i18n="contact_email_label">電子郵件</span>
            <span class="contact-value"><a href="mailto:support@elementawall.com">support@elementawall.com</a></span>
        </div>
        <hr class="divider">
        <div class="contact-item">
            <span class="contact-label" data-i18n="contact_response_label">回覆時間</span>
            <span class="contact-value" data-i18n="contact_response_value">工作日 1–2 個工作天內回覆</span>
        </div>
    </div>
</div>

<script>
(function () {
    function getLang() {
        return (window.I18N && window.I18N.getLanguage()) || localStorage.getItem('ew_lang') || 'zh-TW';
    }

    const langSwitchBtn   = document.getElementById('langSwitchBtn');
    const langMenu        = document.getElementById('langMenu');
    const langSwitchLabel = document.getElementById('langSwitchLabel');
    const aboutSwitchBtn  = document.getElementById('aboutSwitchBtn');
    const aboutMenu       = document.getElementById('aboutMenu');

    function updateLangLabel() {
        const lang = getLang();
        langSwitchLabel.textContent = lang === 'zh-TW' ? '語言' : (lang === 'en' ? 'Language' : '语言');
    }
    updateLangLabel();
    document.addEventListener('i18n:change', updateLangLabel);

    langSwitchBtn.addEventListener('click', e => {
        e.stopPropagation();
        aboutMenu.classList.remove('open');
        langMenu.classList.toggle('open');
    });
    langMenu.addEventListener('click', e => {
        const btn = e.target.closest('[data-lang-option]');
        if (!btn) return;
        if (window.I18N) window.I18N.setLanguage(btn.getAttribute('data-lang-option'));
        langMenu.classList.remove('open');
    });
    aboutSwitchBtn.addEventListener('click', e => {
        e.stopPropagation();
        langMenu.classList.remove('open');
        aboutMenu.classList.toggle('open');
    });
    aboutMenu.addEventListener('click', () => { aboutMenu.classList.remove('open'); });
    document.addEventListener('click', () => { langMenu.classList.remove('open'); aboutMenu.classList.remove('open'); });
})();

(function () {
    const AUTH_KEY = 'bazi_logged_in', AUTH_EMAIL_KEY = 'bazi_logged_in_email';
    const btnLogin = document.getElementById('btnLogin');
    const userMenuWrap = document.getElementById('userMenuWrap');
    const userMenuBtn = document.getElementById('userMenuBtn');
    const userMenu = document.getElementById('userMenu');
    const userMenuEmail = document.getElementById('userMenuEmail');
    function isLoggedIn() { return localStorage.getItem(AUTH_KEY) === '1'; }
    function updateAuthUI() {
        const logged = isLoggedIn();
        btnLogin.style.display = logged ? 'none' : '';
        userMenuWrap.style.display = logged ? '' : 'none';
        userMenuEmail.textContent = logged ? (localStorage.getItem(AUTH_EMAIL_KEY) || '') : '';
    }
    updateAuthUI();
    btnLogin.addEventListener('click', () => { location.href = 'landing.html'; });
    userMenuBtn.addEventListener('click', e => { e.stopPropagation(); userMenu.classList.toggle('open'); });
    document.getElementById('btnDownloadHistory').addEventListener('click', () => { location.href = 'download-history.html'; });
    document.getElementById('btnAccount').addEventListener('click', () => {
        alert(window.I18N ? window.I18N.t('mock_feature_notice') : '此功能即將推出');
        userMenu.classList.remove('open');
    });
    document.getElementById('btnLogout').addEventListener('click', () => {
        localStorage.removeItem(AUTH_KEY); localStorage.removeItem(AUTH_EMAIL_KEY);
        updateAuthUI(); userMenu.classList.remove('open');
    });
    document.addEventListener('click', () => { userMenu.classList.remove('open'); });
})();
</script>
</body>
</html>
