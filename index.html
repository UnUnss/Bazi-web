<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElementaWall · 天干地支八字壁紙</title>
    <!-- 预加载首屏关键资源 -->
    <link rel="preload" href="assets/disk.webp" as="image">
    <link rel="preload" href="assets/bg-paper-opt.jpg" as="image">
    <!-- 楷体字型自托管在 assets/fonts/cooper-zhengkai/，不依赖外部 CDN 或系统字体 -->
    <link rel="stylesheet" href="assets/fonts/cooper-zhengkai/style.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            /* 统一使用自托管的 CooperZhengKai（汇迹正楷），不再依赖/优先使用系统楷体，
               保证所有设备看到的字形一致 */
            font-family: "CooperZhengKai", serif;
            cursor: pointer;
            user-select: none;
        }

        /* 最底层：宣纸背景 */
        .bg {
            position: fixed;
            inset: 0;
            background: url('assets/bg-paper-opt.jpg') center / cover no-repeat;
            z-index: 1;
        }

        /* 圆盘 wrapper：以PS座標（W=3036, H=3036, X=-1065, Y=51，画布 2880×1800）為基準，
           X、Y、W 按同一縮放係數 k=4200/3036≈1.3834 等比縮放（圍繞畫布原點縮放，
           保持跟PS一致的相對位置關係，即在4000px基礎上再放大5%）
           縮放后：X=-1473.32, Y=70.55, W=H=4200 */
        .disk-wrap {
            position: fixed;
            left: -51.16vw;  /* -1473.32/2880*100 */
            top: 3.92vh;     /* 70.55/1800*100 */
            width: 145.83vw; /* 4200/2880*100 */
            height: auto;
            z-index: 2;
            pointer-events: none;
        }

        /* 圆盘 img 与 龙 img 尺寸完全相同（同为2880×1800画布），叠在同一个盒子里，
           中心自然重合，一起旋转。
           transform-origin 基于 alpha 质心实测：disk/dragon 圆心均在画布约(1491,898)处，
           即 51.77% / 49.9%（而非画布几何中心的 50% 50%，两者差约 50px）。 */
        .disk-wrap img {
            display: block;
            width: 100%;
            height: auto;
            animation: spin 90s linear infinite;
            transform-origin: 51.77% 49.9%;
        }

        .disk-wrap .disk-img {
            position: relative; /* 撑开 disk-wrap 的高度 */
            mix-blend-mode: darken;
            opacity: 0.3;
        }

        .disk-wrap .dragon-img {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 金色卷轴：全画布覆盖，JS 按端动态注入 */
        .scroll-video {
            position: fixed;
            width: 100%;
            height: auto;
            left: 0;
            top: 0;
            mix-blend-mode: darken;
            z-index: 3;
            opacity: 0.95;
        }

        /* 文字图层：全画布导出，自动对齐 */
        .text {
            position: fixed;
            width: 100%;
            height: auto;
            left: 0;
            top: 0;
            z-index: 4;
        }

        /* ElementaWall：全画布导出，自动对齐 */
        .brand {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 10;
            pointer-events: none;
        }

        /* CTA 按钮：放在右下方（留有余白，不贴死角落） */
        .cta-wrap {
            position: fixed;
            bottom: 9vh;
            right: 12vw;
            z-index: 10;
            text-align: center;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            font-size: 15px;
            letter-spacing: 0.22em;
            color: #2a1e0a;
            text-decoration: none;
            padding: 12px 32px;
            border: 1px solid rgba(42, 30, 10, 0.3);
            border-radius: 2px;
            background: rgba(237, 228, 210, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.3s, letter-spacing 0.3s;
        }

        .cta-btn:hover {
            background: rgba(237, 228, 210, 0.95);
            letter-spacing: 0.3em;
        }

        .arrow { font-size: 17px; transition: transform 0.3s; }
        .cta-btn:hover .arrow { transform: translateX(4px); }

        .cta-sub {
            margin-top: 12px;
            font-size: 15px;
            letter-spacing: 0.12em;
            color: #9a8a68;
            white-space: pre-line; /* 用真实换行符换行，不用逗号 */
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* 电脑端：转盘、卷轴、卷轴上的「乐天知运」文字、ElementaWall logo 整体上移2vh */
        @media (min-width: 721px) {
            .disk-wrap {
                top: 1.92vh; /* 3.92vh - 2vh */
            }

            /* 电脑端隐藏图片卷轴，改用桌面视频 */
            .scroll-picture { display: none; }
            .scroll-video {
                top: 15.92vh; /* 圆盘顶部 1.92vh + 14vh */
            }

            /* 让「乐天知运」文字垂直居中于视频：
               text_top = video_top(15.92vh) + video_half_height(11.57vw) - text_center_in_canvas(22.25vw) */
            .text {
                top: calc(15.92vh - 10.68vw);
            }

            /* logo 在整体上移2vh的基础上，再向下移1vh，合计上移1vh */
            .brand {
                top: -1vh;
            }
        }

        @media (max-width: 720px) {
            .cta-wrap {
                left: 50%;
                right: auto;
                bottom: 6vh;
                transform: translateX(-50%);
            }

            /* 手機端用另一份直式 PSD（天干地支 手机.psd，画布 1242×2208）的圆盘座標
               （W=2183, H=2183, X=-967, Y=171），X、Y、W 整體等比放大1.5倍
               （圍繞畫布原點縮放，保持跟PS一致的相對位置關係）
               放大后：X=-1450.5, Y=256.5, W=H=3274.5 */
            .disk-wrap {
                left: -116.80vw; /* -1450.5/1242*100 */
                top: 11.62vh;    /* 256.5/2208*100 */
                width: 263.65vw; /* 3274.5/1242*100 */
            }

            /* 手机端视频卷轴：与原 scroll-2.png 对齐位置 */
            .scroll-video {
                top: 20vh;
            }

            /* 手机端文字：与电脑端相同思路，让「乐天知运」居中于视频高度
               text_top = video_top(20vh) + video_half(21.43vw) - text_center_in_canvas(36.8vw) */
            .text {
                top: calc(20vh - 15.37vw);
                left: -32.69vw;
                width: 165.38vw;
            }

            /* 手機端 logo 放大兩倍，保持水平居中 */
            .brand {
                left: -50vw;
                width: 200vw;
            }
        }
    </style>
</head>
<body>

<!-- z-index 1：宣纸底层 -->
<div class="bg"></div>

<!-- 点击整页跳转排盘（landing 为用户可见页，index 仅底层计算） -->
<div style="position:fixed;inset:0;z-index:5;cursor:pointer;"
     onclick="window.location.href='landing.html'">

    <!-- 圆盘：darken + 30% 不透明度；龙与圆盘同为2880×1800画布，直接叠在同一个盒子里，圆心自动重合 -->
    <div class="disk-wrap">
        <img class="disk-img" src="assets/disk.webp" alt="" draggable="false">
        <img class="dragon-img" src="assets/dragon.png" alt="" draggable="false">
    </div>

    <!-- 卷轴视频：JS 按端动态注入，避免另一端预加载 -->
    <script>
    (function () {
        var src = window.innerWidth >= 721
            ? 'assets/video.mp4'
            : 'assets/video-2-opt.mp4';
        var v = document.createElement('video');
        v.className = 'scroll-video';
        v.setAttribute('autoplay', '');
        v.setAttribute('loop', '');
        v.setAttribute('muted', '');
        v.setAttribute('playsinline', '');
        v.muted = true;
        var s = document.createElement('source');
        s.src = src;
        s.type = 'video/mp4';
        v.appendChild(s);
        document.currentScript.parentNode.insertBefore(v, document.currentScript.nextSibling);
        v.load();
        v.play().catch(function () {});
    })();
    </script>

    <!-- 文字图层 -->
    <img class="text" src="assets/text.png" alt="" draggable="false">

</div>

<!-- z-index 10：品牌名 & 按钮，始终在最上 -->
<img class="brand" src="assets/english.png" alt="ElementaWall" draggable="false" style="mix-blend-mode: multiply;">

<div class="cta-wrap">
    <a class="cta-btn" href="landing.html">
        <span data-i18n="cta_start">開始</span><span class="arrow">›</span>
    </a>
    <p class="cta-sub" data-i18n="cta_sub">基於生辰八字<br>定制每月運勢壁紙</p>
</div>

<script src="i18n.js"></script>
</body>
</html>
