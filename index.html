<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>八字排盘与大运</title>
    <!-- 引入 lunar-javascript 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
</head>
<body>
    <h1>基本八字与大运排盘</h1>
    
    <div>
        <label>公历出生时间：</label>
        <input type="number" id="year" placeholder="年 (如1990)" style="width: 80px;" required> 年
        <input type="number" id="month" placeholder="月" min="1" max="12" style="width: 50px;" required> 月
        <input type="number" id="day" placeholder="日" min="1" max="31" style="width: 50px;" required> 日
        <input type="number" id="hour" placeholder="时" min="0" max="23" style="width: 50px;" required> 时
        <input type="number" id="minute" placeholder="分" min="0" max="59" style="width: 50px;" required> 分
    </div>
    <div style="margin-top: 10px;">
        <label>出生地地名：</label>
        <input type="text" id="birthplace" placeholder="如: 北京、纽约" value="北京" style="width: 150px;" required>
        <small>(将自动获取该地点的经度)</small>
    </div>
    <div style="margin-top: 10px;">
        <label>出生地时区：</label>
        <input type="number" step="0.5" id="timezone" value="8" style="width: 60px;" required>
        <small>(东区为正，西区为负。如北京填8，纽约填-5。注意：若是夏令时期间，请先手动将出生时间减去1小时)</small>
    </div>
    <div style="margin-top: 10px;">
        <label>性别：</label>
        <select id="gender">
            <option value="1">男 (乾造)</option>
            <option value="0">女 (坤造)</option>
        </select>
    </div>
    <div style="margin-top: 10px;">
        <button onclick="calculateBazi()">排盘</button>
        <span id="loading" style="display:none; color: gray;">正在获取经度...</span>
    </div>

    <div style="margin-top: 20px;">
        <h2>真太阳时转换结果</h2>
        <div id="solarResult" style="color: blue;"></div>
    </div>

    <div style="margin-top: 20px;">
        <h2>八字排盘结果</h2>
        <div id="baziResult"></div>
    </div>

    <div style="margin-top: 20px;">
        <h2>大运</h2>
        <div id="dayunResult"></div>
    </div>

    <script src="bazi_logic.js"></script>
    <script>
        async function calculateBazi() {
            const year = parseInt(document.getElementById('year').value, 10);
            const month = parseInt(document.getElementById('month').value, 10);
            const day = parseInt(document.getElementById('day').value, 10);
            const hour = parseInt(document.getElementById('hour').value, 10);
            const minute = parseInt(document.getElementById('minute').value, 10);
            const birthplace = document.getElementById('birthplace').value.trim();
            const timezone = parseFloat(document.getElementById('timezone').value);

            if (isNaN(year) || isNaN(month) || isNaN(day) || isNaN(hour) || isNaN(minute) || !birthplace || isNaN(timezone)) {
                alert('请填写完整的年、月、日、时、分、出生地和时区');
                return;
            }

            const gender = parseInt(document.getElementById('gender').value, 10);

            // 获取经度
            let longitude = 120; // 默认北京经度
            let fetchSuccess = false;
            document.getElementById('loading').style.display = 'inline';
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(birthplace)}&format=json&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    longitude = parseFloat(data[0].lon);
                    fetchSuccess = true;
                } else {
                    alert('无法找到该地点的经纬度，将默认使用当前时区的标准经度进行计算。');
                    longitude = timezone * 15;
                }
            } catch (err) {
                console.error(err);
                alert('获取地理位置网络请求失败，将默认使用当前时区的标准经度进行计算。');
                longitude = timezone * 15;
            }
            document.getElementById('loading').style.display = 'none';

            // 1. 计算真太阳时
            // 获取用户输入的当地时间
            const inputDate = new Date(year, month - 1, day, hour, minute);
            
            // 计算这是一年中的第几天
            const start = new Date(inputDate.getFullYear(), 0, 0);
            const diff = inputDate - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            // 均时差 (Equation of Time) 近似公式 (单位：分钟)
            const b = 2 * Math.PI * (dayOfYear - 81) / 365;
            const eot = 9.87 * Math.sin(2 * b) - 7.53 * Math.cos(b) - 1.5 * Math.sin(b);
            
            // 计算该时区的标准经度
            const standardLongitude = timezone * 15;
            
            // 经度差 (1度 = 4分钟)
            const longDiff = (longitude - standardLongitude) * 4;

            // 总时间偏差 (分钟)
            const totalOffsetMinutes = longDiff + eot;
            
            // 得到真太阳时对象
            const trueSolarTime = new Date(inputDate.getTime() + totalOffsetMinutes * 60000);
            
            const tsYear = trueSolarTime.getFullYear();
            const tsMonth = trueSolarTime.getMonth() + 1;
            const tsDay = trueSolarTime.getDate();
            const tsHour = trueSolarTime.getHours();
            const tsMinute = trueSolarTime.getMinutes();
            
            document.getElementById('solarResult').innerHTML = 
                `输入的当地时间: ${year}-${month}-${day} ${hour}:${minute} <br/>` + 
                `目标地点 [${birthplace}] 的经度: ${longitude.toFixed(4)}度 (所在时区标准经度: ${standardLongitude}度)<br/>` + 
                `平太阳时修正: ${longDiff.toFixed(2)} 分钟 <br/>` + 
                `均时差(真太阳修正): ${eot.toFixed(2)} 分钟 <br/>` + 
                `<b>最终真太阳时: ${tsYear}-${tsMonth}-${tsDay} ${tsHour}:${tsMinute}</b>`;

            // 2. 生成Solar对象 (使用真太阳时)
            const solar = Solar.fromYmdHms(tsYear, tsMonth, tsDay, tsHour, tsMinute, 0);
            const lunar = solar.getLunar();
            const eightChar = lunar.getEightChar();
            
            // 构造bazi字典结构用于动态算分
            const baziDict = {
                year: {gan: eightChar.getYearGan(), zhi: eightChar.getYearZhi()},
                month: {gan: eightChar.getMonthGan(), zhi: eightChar.getMonthZhi()},
                day: {gan: eightChar.getDayGan(), zhi: eightChar.getDayZhi()},
                time: {gan: eightChar.getTimeGan(), zhi: eightChar.getTimeZhi()}
            };

            // 获取八字
            const baziStr = `
                年柱: ${eightChar.getYear()} <br/>
                月柱: ${eightChar.getMonth()} <br/>
                日柱: ${eightChar.getDay()} <br/>
                时柱: ${eightChar.getTime()} <br/>
            `;
            document.getElementById('baziResult').innerHTML = baziStr;

            // 获取大运
            const yun = eightChar.getYun(gender);
            let dayunStr = '<ul>';
            
            // 获取大运数组
            const list = yun.getDaYun();
            for (let i = 0; i < list.length; i++) {
                const daYun = list[i];
                dayunStr += `<li>
                    <details>
                        <summary style="cursor: pointer; font-weight: bold;">
                            大运 [${daYun.getStartAge()}岁] - ${daYun.getGanZhi()} (${daYun.getStartYear()}年起)
                        </summary>
                        <ul style="margin-top: 5px;">
                `;

                // 获取流年
                const liuNianList = daYun.getLiuNian();
                for (let j = 0; j < liuNianList.length; j++) {
                    const liuNian = liuNianList[j];
                    dayunStr += `<li>
                        <details style="margin-left: 10px;">
                            <summary style="cursor: pointer; color: #333;">
                                流年: ${liuNian.getYear()}年 (${liuNian.getAge()}岁) - <b>${liuNian.getGanZhi()}</b>
                            </summary>
                            <ul style="margin-top: 5px; color: #555; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                    `;

                    // 获取流月
                    if (typeof liuNian.getLiuYue === 'function') {
                        const liuYueList = liuNian.getLiuYue();
                        for (let k = 0; k < liuYueList.length; k++) {
                            const liuYue = liuYueList[k];
                            const gz = liuYue.getGanZhi();
                            const ly_zhi = gz.charAt(1);
                            
                            // 动态计算流月喜用和弱势领域
                            const fav_info = get_monthly_favorable_element(baziDict, ly_zhi, gender);
                            const fav_wx = fav_info.favorable_element;
                            const weak_domains = fav_info.weak_domains.join('、');
                            
                            dayunStr += `<li style="list-style: none; margin-bottom: 5px;">
                                ${liuYue.getMonthInChinese()}月: ${gz} <br/>
                                <span style="color: #b00; font-size: 0.85em; background: #fff3f3; padding: 2px;">最旺喜用: ${fav_wx}</span><br/>
                                <span style="color: #666; font-size: 0.85em; background: #f0f0f0; padding: 2px;">运势偏弱: ${weak_domains}</span>
                            </li>`;
                        }
                    }
                    dayunStr += `</ul></details></li>`;
                }

                dayunStr += `</ul></details></li>`;
            }
            dayunStr += '</ul>';
            
            document.getElementById('dayunResult').innerHTML = dayunStr;
        }
    </script>
</body>
</html>
