<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElementaWall · 天干地支八字壁紙</title>
    <!-- 楷体字型自托管在 assets/fonts/cooper-zhengkai/，不依赖外部 CDN 或系统字体 -->
    <link rel="stylesheet" href="assets/fonts/cooper-zhengkai/style.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            /* 系统楷体优先（Kaiti SC/STKaiti/Kaiti TC/BiauKai 为苹果系统，KaiTi/DFKai-SB/標楷體
               为 Windows 简繁楷体），自托管的 CooperZhengKai（汇迹正楷）在无楷体设备上兜底 */
            font-family: "Kaiti SC", "STKaiti", "Kaiti TC", "BiauKai", "KaiTi", "DFKai-SB", "標楷體",
                         "CooperZhengKai",
                         serif;
            cursor: pointer;
            user-select: none;
        }

        /* 最底层：宣纸背景 */
        .bg {
            position: fixed;
            inset: 0;
            background: url('assets/bg-paper.jpg') center / cover no-repeat;
            z-index: 1;
        }

        /* 圆盘 wrapper：以PS座標（W=3036, H=3036, X=-1065, Y=51，画布 2880×1800）為基準，
           X、Y、W 按同一縮放係數 k=4200/3036≈1.3834 等比縮放（圍繞畫布原點縮放，
           保持跟PS一致的相對位置關係，即在4000px基礎上再放大5%）
           縮放后：X=-1473.32, Y=70.55, W=H=4200 */
        .disk-wrap {
            position: fixed;
            left: -51.16vw;  /* -1473.32/2880*100 */
            top: 3.92vh;     /* 70.55/1800*100 */
            width: 145.83vw; /* 4200/2880*100 */
            height: auto;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: darken;
            opacity: 0.3;
        }

        /* 圆盘 img：只负责旋转，旋转中心为圆盘中心 */
        .disk-wrap img {
            display: block;
            width: 100%;
            height: auto;
            animation: spin 90s linear infinite;
            transform-origin: center center;
        }

        /* 金色卷轴：全画布导出，top:0 left:0 自动对齐PS位置 */
        .scroll {
            position: fixed;
            width: 100%;
            height: auto;
            left: 0;
            top: 0;
            mix-blend-mode: darken;
            z-index: 3;
        }

        /* 文字图层：全画布导出，自动对齐 */
        .text {
            position: fixed;
            width: 100%;
            height: auto;
            left: 0;
            top: 0;
            z-index: 4;
        }

        /* ElementaWall：全画布导出，自动对齐 */
        .brand {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 10;
            pointer-events: none;
        }

        /* CTA 按钮：放在右下方（留有余白，不贴死角落） */
        .cta-wrap {
            position: fixed;
            bottom: 9vh;
            right: 12vw;
            z-index: 10;
            text-align: center;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            font-size: 15px;
            letter-spacing: 0.22em;
            color: #2a1e0a;
            text-decoration: none;
            padding: 12px 32px;
            border: 1px solid rgba(42, 30, 10, 0.3);
            border-radius: 2px;
            background: rgba(237, 228, 210, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.3s, letter-spacing 0.3s;
        }

        .cta-btn:hover {
            background: rgba(237, 228, 210, 0.95);
            letter-spacing: 0.3em;
        }

        .arrow { font-size: 17px; transition: transform 0.3s; }
        .cta-btn:hover .arrow { transform: translateX(4px); }

        .cta-sub {
            margin-top: 12px;
            font-size: 15px;
            letter-spacing: 0.12em;
            color: #9a8a68;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @media (max-width: 720px) {
            .cta-wrap {
                left: 50%;
                right: auto;
                bottom: 6vh;
                transform: translateX(-50%);
            }

            /* 手機端用另一份直式 PSD（天干地支 手机.psd，画布 1242×2208）的圆盘座標
               （W=2183, H=2183, X=-967, Y=171），X、Y、W 整體等比放大1.5倍
               （圍繞畫布原點縮放，保持跟PS一致的相對位置關係）
               放大后：X=-1450.5, Y=256.5, W=H=3274.5 */
            .disk-wrap {
                left: -116.80vw; /* -1450.5/1242*100 */
                top: 11.62vh;    /* 256.5/2208*100 */
                width: 263.65vw; /* 3274.5/1242*100 */
            }

            /* 手機端卷轴往下挪，對齊到「樂天知運」文字目前的高度；整體再往上挪3vh */
            .scroll {
                top: 21vh;
            }

            /* 手機端「樂天知運 故不憂」文字图层要跟卷轴一起挪動，
               同時放大：讓文字區塊的渲染高度跟卷轴宽度（100vw）差不多——
               原圖比例(画布2880×1800)下，寬度160vw時渲染高度恰好=160vw×1800/2880=100vw，
               所以寬度改為160vw，並用left:-30vw保持水平居中 */
            .text {
                top: 14vh;
                left: -32.69vw;
                width: 165.38vw;
            }

            /* 手機端 logo 放大兩倍，保持水平居中 */
            .brand {
                left: -50vw;
                width: 200vw;
            }
        }
    </style>
</head>
<body>

<!-- z-index 1：宣纸底层 -->
<div class="bg"></div>

<!-- 点击整页跳转排盘（landing 为用户可见页，index 仅底层计算） -->
<div style="position:fixed;inset:0;z-index:5;cursor:pointer;"
     onclick="window.location.href='landing.html'">

    <!-- 圆盘：darken + 30% 不透明度 -->
    <div class="disk-wrap">
        <img src="assets/disk.png" alt="" draggable="false">
    </div>

    <!-- 卷轴：darken 混合，手機端換用 scroll-2.png（跟手機版 PSD 配套的素材） -->
    <picture>
        <source media="(max-width: 720px)" srcset="assets/scroll-2.png">
        <img class="scroll" src="assets/scroll.png" alt="" draggable="false">
    </picture>

    <!-- 文字图层 -->
    <img class="text" src="assets/text.png" alt="" draggable="false">

</div>

<!-- z-index 10：品牌名 & 按钮，始终在最上 -->
<img class="brand" src="assets/english.png" alt="ElementaWall" draggable="false" style="mix-blend-mode: multiply;">

<div class="cta-wrap">
    <a class="cta-btn" href="landing.html">
        <span data-i18n="cta_start">開始</span><span class="arrow">›</span>
    </a>
    <p class="cta-sub" data-i18n="cta_sub">基於生辰八字，定制每月運勢壁紙</p>
</div>

<script src="i18n.js"></script>
</body>
</html>
